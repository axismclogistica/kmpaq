<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axis MC Logística | Cotizador por Paquetes Km y Peso</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b1220;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:40px;
}

/* CONTENEDOR */

.container{
width:100%;
max-width:650px;
background:#0f172a;
padding:50px;
border-radius:25px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
text-align:center;
}

/* TITULOS */

h1{
font-size:38px;
margin-bottom:10px;
}

h2{
font-size:20px;
margin-bottom:35px;
color:#cbd5f5;
}

/* INPUTS */

input{
width:100%;
padding:15px;
margin:12px 0;
border-radius:10px;
border:none;
font-size:16px;
}

/* BOTON */

button{
margin-top:20px;
padding:16px 40px;
background:linear-gradient(90deg,#00d4c0,#0066ff);
border:none;
border-radius:50px;
color:white;
font-weight:600;
font-size:16px;
cursor:pointer;
transition:0.3s;
box-shadow:0 10px 30px rgba(0,212,192,0.4);
}

button:hover{
transform:translateY(-3px);
box-shadow:0 15px 40px rgba(0,212,192,0.8);
}

/* RESULTADO */

.resultado{
margin-top:30px;
font-size:26px;
font-weight:600;
color:#00d4c0;
}

/* DESGLOSE */

.detalle{
margin-top:20px;
font-size:14px;
color:#94a3b8;
line-height:1.8;
}

/* WHATSAPP */

.whatsapp{
display:inline-block;
margin-top:30px;
text-decoration:none;
padding:14px 35px;
background:#25D366;
color:white;
border-radius:50px;
font-weight:500;
}

.whatsapp:hover{
opacity:0.9;
}

</style>
</head>

<body>

<div class="container">

<h1>Axis MC Logística</h1>
<h2>Cotizador por Paquetes, Km y Peso</h2>

<input type="number" id="paquetes" placeholder="Cantidad de paquetes">

<input type="number" id="peso" placeholder="Peso total (kg)">

<input type="number" id="km" placeholder="Distancia en kilómetros">

<button onclick="cotizar()">Calcular Cotización</button>

<div class="resultado" id="resultado"></div>

<div class="detalle" id="detalle"></div>

<a id="whatsapp" class="whatsapp" target="_blank" style="display:none;">
Enviar cotización por WhatsApp
</a>

</div>

<script>

function cotizar(){

let paquetes = parseFloat(document.getElementById("paquetes").value);
let peso = parseFloat(document.getElementById("peso").value);
let km = parseFloat(document.getElementById("km").value);

if(paquetes>0 && peso>=0 && km>=0){

let precioPaquete = paquetes * 1800;
let precioPeso = peso * 150;
let precioKm = km * 250;

let total = precioPaquete + precioPeso + precioKm;

document.getElementById("resultado").innerHTML =
"Total estimado: ₡" + total.toLocaleString();

document.getElementById("detalle").innerHTML =
"Paquetes: ₡"+precioPaquete.toLocaleString()+"<br>"+
"Peso: ₡"+precioPeso.toLocaleString()+"<br>"+
"Distancia: ₡"+precioKm.toLocaleString();

let mensaje = "Hola Axis MC Logística, quiero cotizar un envío:%0A"+
"Paquetes: "+paquetes+"%0A"+
"Peso: "+peso+" kg%0A"+
"Distancia: "+km+" km%0A"+
"Total estimado: ₡"+total;

let url = "https://api.whatsapp.com/send?phone=5067249469&text="+mensaje;

let boton = document.getElementById("whatsapp");
boton.href = url;
boton.style.display = "inline-block";

}else{

document.getElementById("resultado").innerHTML = "Ingrese valores válidos.";

}

}

</script>

</body>
</html>
